<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ataraxia is a premium meditation experience designed for deep calm, clarity, and emotional balance."
    />
    <title>Ataraxia — Premium Meditation Experience</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header" aria-label="Primary">
      <div class="container nav-shell">
        <a class="brand" href="#" aria-label="Ataraxia home">Ataraxia</a>
        <a class="nav-cta" href="#waitlist">Reserve access</a>
      </div>
    </header>

    <main id="main-content">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-bg" aria-hidden="true">
          <div class="orb" id="orb"></div>
          <div class="grain"></div>
        </div>

        <div class="container hero-content">
          <p class="eyebrow">A quieter way to reset</p>
          <h1 id="hero-title">Meditation for minds that never stop.</h1>
          <p class="hero-subtext">
            Cinematic soundscapes, breath-led sessions, and adaptive guidance crafted for deep calm in minutes.
          </p>

          <div class="cta-row" id="waitlist">
            <a class="btn btn-primary" href="#" aria-label="Start your free 14-day trial">
              Start free 14-day trial
            </a>
            <a class="btn btn-secondary" href="#" aria-label="Watch a two-minute preview">
              Watch preview
            </a>
          </div>

          <p class="trust-copy">No card required · Cancel anytime · New sessions weekly</p>
        </div>
      </section>
    </main>

    <script src="assets/script.js" defer></script>
  </body>
</html>
